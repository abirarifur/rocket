# Local development backing services for Rocket.
# Application services run on the host via `pnpm dev` for fast reloads.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rocket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rocket}
      POSTGRES_DB: ${POSTGRES_DB:-rocket}
    ports:
      - "5434:5432"
    volumes:
      - ./.volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rocket}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - ./.volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-rocketminio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-rocketminio}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - ./.volumes/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job: create the artifacts bucket on startup.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-rocketminio} ${S3_SECRET_KEY:-rocketminio} &&
      mc mb --ignore-existing local/${S3_BUCKET:-rocket-artifacts} &&
      echo 'bucket ready';
      "
