apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocket-api
  namespace: rocket
  labels: { app: rocket-api }
spec:
  replicas: 3
  selector:
    matchLabels: { app: rocket-api }
  template:
    metadata:
      labels: { app: rocket-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/rocket-api:latest
          # Migrations are applied by the migrate Job, not on every replica.
          command: ["node", "/app/api/dist/main.js"]
          ports: [{ containerPort: 4000 }]
          envFrom:
            - configMapRef: { name: rocket-config }
            - secretRef: { name: rocket-secrets }
          readinessProbe:
            httpGet: { path: /ready, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: rocket-api
  namespace: rocket
  labels: { app: rocket-api }
spec:
  selector: { app: rocket-api }
  ports: [{ port: 4000, targetPort: 4000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rocket-api
  namespace: rocket
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rocket-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
