apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocket-runner
  namespace: rocket
  labels: { app: rocket-runner }
spec:
  replicas: 2
  selector:
    matchLabels: { app: rocket-runner }
  template:
    metadata:
      labels: { app: rocket-runner }
    spec:
      containers:
        - name: runner
          image: ghcr.io/your-org/rocket-runner:latest
          ports: [{ containerPort: 4200 }]
          envFrom:
            - configMapRef: { name: rocket-config }
          readinessProbe:
            httpGet: { path: /health, port: 4200 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4200 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "200m", memory: "192Mi" }
            limits: { cpu: "1", memory: "384Mi" }
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: rocket-runner
  namespace: rocket
spec:
  selector: { app: rocket-runner }
  ports: [{ port: 4200, targetPort: 4200 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rocket-runner
  namespace: rocket
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rocket-runner
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
