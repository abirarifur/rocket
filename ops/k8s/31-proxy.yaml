apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocket-proxy
  namespace: rocket
  labels: { app: rocket-proxy }
spec:
  replicas: 3
  selector:
    matchLabels: { app: rocket-proxy }
  template:
    metadata:
      labels: { app: rocket-proxy }
    spec:
      containers:
        - name: proxy
          image: ghcr.io/your-org/rocket-proxy:latest
          ports: [{ containerPort: 4100 }]
          envFrom:
            - configMapRef: { name: rocket-config }
          readinessProbe:
            httpGet: { path: /health, port: 4100 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4100 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "200m", memory: "192Mi" }
            limits: { cpu: "1", memory: "384Mi" }
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: rocket-proxy
  namespace: rocket
spec:
  selector: { app: rocket-proxy }
  ports: [{ port: 4100, targetPort: 4100 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rocket-proxy
  namespace: rocket
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rocket-proxy
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
