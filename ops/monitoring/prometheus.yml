global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrapes the API's /metrics endpoint. On the docker network the API service
  # is reachable as `api:4000`; in k8s, Prometheus uses the pod annotations
  # (prometheus.io/scrape) instead.
  - job_name: rocket-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]
        labels:
          service: api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
