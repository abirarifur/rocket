name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (build + unit + integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rocket
          POSTGRES_PASSWORD: rocket
          POSTGRES_DB: rocket
        ports: ['5434:5432']
        options: >-
          --health-cmd "pg_isready -U rocket" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6380:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: rocketminio
          MINIO_ROOT_PASSWORD: rocketminio
          MINIO_DEFAULT_BUCKETS: rocket-artifacts
        ports: ['9100:9000']
    env:
      DATABASE_URL: postgresql://rocket:rocket@localhost:5434/rocket?schema=public
      REDIS_URL: redis://localhost:6380
      S3_ENDPOINT: http://localhost:9100
      S3_ACCESS_KEY: rocketminio
      S3_SECRET_KEY: rocketminio
      S3_BUCKET: rocket-artifacts
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      ENCRYPTION_KEY: ci-encryption-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: backend/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile=false
        working-directory: backend
      - run: pnpm --filter @rocket/api prisma:generate
        working-directory: backend
      - run: pnpm --filter @rocket/api prisma:deploy
        working-directory: backend
      - run: pnpm build
        working-directory: backend
      - run: pnpm typecheck
        working-directory: backend
      - run: pnpm test
        working-directory: backend
      - run: pnpm --filter @rocket/api test:int
        working-directory: backend

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: frontend/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile=false
        working-directory: frontend
      - run: pnpm typecheck
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend
