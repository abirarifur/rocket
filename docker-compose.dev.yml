# ── Hot-reload development stack ─────────────────────────────────────────────
# Source code is mounted into the containers and every app runs in WATCH mode
# (next dev / nest --watch / tsx watch). Edit a file on your host and it reloads
# instantly — NO image rebuilds, ever.
#
#   Start:   docker compose -f docker-compose.dev.yml up
#   Stop:    docker compose -f docker-compose.dev.yml down
#
# First boot is slower (installs deps into named volumes once); subsequent boots
# are fast. node_modules live in named volumes, so nothing root-owned is written
# back onto your host working tree.
#
# Host ports: web 3001, api 4000, proxy 4100, runner 4200,
#             postgres 5434, redis 6380, minio 9100/9101.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rocket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rocket}
      POSTGRES_DB: ${POSTGRES_DB:-rocket}
    ports:
      - "5434:5432"
    volumes:
      - ./.volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rocket}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - ./.volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-rocketminio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-rocketminio}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - ./.volumes/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-rocketminio} ${S3_SECRET_KEY:-rocketminio} &&
      mc mb --ignore-existing local/${S3_BUCKET:-rocket-artifacts} &&
      echo 'bucket ready';
      "

  # All three backend services (api, proxy, runner) run together via `turbo dev`,
  # each in watch mode. They share one workspace install.
  backend:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-rocket}:${POSTGRES_PASSWORD:-rocket}@postgres:5432/${POSTGRES_DB:-rocket}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rocketminio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rocketminio}
      S3_BUCKET: ${S3_BUCKET:-rocket-artifacts}
      API_PORT: "4000"
      PROXY_PORT: "4100"
      RUNNER_PORT: "4200"
      # Within one container the services reach each other over localhost.
      PROXY_BASE_URL: http://localhost:4100
      RUNNER_BASE_URL: http://localhost:4200
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-change-me}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-1209600}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3001}
      OAUTH_CALLBACK_BASE: ${OAUTH_CALLBACK_BASE:-http://localhost:4000}
      MOCK_OAUTH: ${MOCK_OAUTH:-1}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # Reliable file-watching for mounted volumes on macOS/Windows.
      CHOKIDAR_USEPOLLING: "true"
      # Turbo 2 defaults to strict env mode, which hides undeclared vars (e.g.
      # DATABASE_URL) from the dev tasks. Loose mode passes the full env through.
      TURBO_ENV_MODE: loose
    command: >
      sh -c "corepack enable &&
             pnpm install --frozen-lockfile=false &&
             pnpm --filter @rocket/types build &&
             pnpm --filter @rocket/api prisma:generate &&
             pnpm --filter @rocket/api prisma:deploy &&
             pnpm dev"
    volumes:
      - ./backend:/app
      - backend_root_modules:/app/node_modules
      - backend_api_modules:/app/api/node_modules
      - backend_proxy_modules:/app/proxy/node_modules
      - backend_runner_modules:/app/runner/node_modules
      - backend_shared_modules:/app/shared/node_modules
    ports:
      - "4000:4000"
      - "4100:4100"
      - "4200:4200"

  web:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      # Reliable hot-reload for mounted volumes on macOS/Windows.
      WATCHPACK_POLLING: "true"
    command: >
      sh -c "corepack enable &&
             pnpm install --frozen-lockfile=false &&
             pnpm dev"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    ports:
      - "3001:3001"

volumes:
  backend_root_modules:
  backend_api_modules:
  backend_proxy_modules:
  backend_runner_modules:
  backend_shared_modules:
  web_node_modules:
  web_next_cache:
