# All-in-one stack: backing services + every app, built from source.
# Start the whole project with:  docker compose -f docker-compose.full.yml up --build
#
# Host ports (remapped to avoid local collisions): web 3001, api 4000,
# proxy 4100, postgres 5434, redis 6380, minio 9100/9101.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rocket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rocket}
      POSTGRES_DB: ${POSTGRES_DB:-rocket}
    ports:
      - "5434:5432"
    volumes:
      - ./.volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rocket}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - ./.volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-rocketminio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-rocketminio}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - ./.volumes/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-rocketminio} ${S3_SECRET_KEY:-rocketminio} &&
      mc mb --ignore-existing local/${S3_BUCKET:-rocket-artifacts} &&
      echo 'bucket ready';
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-rocket}:${POSTGRES_PASSWORD:-rocket}@postgres:5432/${POSTGRES_DB:-rocket}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rocketminio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rocketminio}
      S3_BUCKET: ${S3_BUCKET:-rocket-artifacts}
      API_PORT: "4000"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-1209600}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3001}
    ports:
      - "4000:4000"

  proxy:
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
    restart: unless-stopped
    environment:
      PROXY_PORT: "4100"
      PROXY_MAX_RESPONSE_BYTES: ${PROXY_MAX_RESPONSE_BYTES:-10485760}
      PROXY_TIMEOUT_MS: ${PROXY_TIMEOUT_MS:-30000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3001}
    ports:
      - "4100:4100"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Browser talks to the API via the host-published port.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3001:3001"
